<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Login</title><style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    background: rgba(0,0,0,0.8);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00f0ff;
    width: 90%;
    max-width: 350px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #00f0ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    box-shadow: 0 0 15px #00f0ff;
}

#adminPanel {
    display: none;
}
</style></head><body><div class="container">
    <h2>Login</h2><input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<div id="adminPanel">
    <h3>All Players</h3>
    <ul id="playersList"></ul>
</div>

</div><script>

// Users
let users = {
    "marwan": "1234",
    "ahmed": "5678",
    "ali": "0000",
    "admin": "admin"
};

// Load saved data
let savedPlayers = JSON.parse(localStorage.getItem("players")) || [];

// Auto Save function
function savePlayer(name){
    savedPlayers.push(name);
    localStorage.setItem("players", JSON.stringify(savedPlayers));
}

// Login
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(users[user] && users[user] === pass){

        document.getElementById("msg").innerText = "Welcome " + user;
        savePlayer(user);

        if(user === "admin"){
            showPlayers();
        }

    } else {
        document.getElementById("msg").innerText = "Wrong Data ❌";
    }
}

// Show players for admin
function showPlayers(){
    let panel = document.getElementById("adminPanel");
    let list = document.getElementById("playersList");

    panel.style.display = "block";
    list.innerHTML = "";

    savedPlayers.forEach(p => {
        let li = document.createElement("li");
        li.textContent = p;
        list.appendChild(li);
    });
}

</script></body>
</html>
